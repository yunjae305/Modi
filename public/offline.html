<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#5b45f2" />
    <title>Modi 오프라인</title>
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-width: 320px;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        font-family: Pretendard, "Noto Sans KR", system-ui, sans-serif;
        color: #111827;
        background: linear-gradient(180deg, #ffffff 0%, #f7f8fc 100%);
      }

      main {
        width: min(100%, 480px);
        border: 1px solid #dfe3ee;
        border-radius: 24px;
        background: #ffffff;
        padding: 28px;
        text-align: center;
        box-shadow: 0 18px 45px rgba(15, 23, 42, 0.08);
      }

      h1 {
        margin: 0;
        font-size: 28px;
        line-height: 1.25;
      }

      p {
        margin: 14px 0 0;
        color: #667085;
        font-weight: 700;
        line-height: 1.7;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>오프라인 상태입니다</h1>
      <p>이미 열어둔 화면과 저장된 시나리오 데이터는 다시 연결되면 이어서 확인할 수 있습니다.</p>
    </main>
  </body>
</html>
