server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: modi-server
  config:
    import:
      - optional:file:.env[.properties]
      - optional:file:../.env[.properties]
  datasource:
    url: ${DATABASE_URL:jdbc:h2:file:./data/modi;AUTO_SERVER=TRUE;MODE=MySQL}
    username: ${DATABASE_USERNAME:sa}
    password: ${DATABASE_PASSWORD:}
    driver-class-name: ${DATABASE_DRIVER:org.h2.Driver}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  h2:
    console:
      enabled: true
      path: /h2-console

modi:
  frontend-url: ${FRONTEND_URL:http://localhost:5173}
  backend-url: ${BACKEND_URL:http://localhost:8080}
  jwt-secret: ${JWT_SECRET:modi-local-development-secret-change-before-release}
  session-cookie-name: MODI_SESSION
  oauth-state-cookie-name: MODI_OAUTH_STATE
  google:
    client-id: ${GOOGLE_CLIENT_ID:}
    client-secret: ${GOOGLE_CLIENT_SECRET:}
  kakao:
    client-id: ${KAKAO_CLIENT_ID:}
    client-secret: ${KAKAO_CLIENT_SECRET:}
